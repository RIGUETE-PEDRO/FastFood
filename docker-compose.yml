services:

  app:
    build: .
    container_name: laravel_flashfood
    working_dir: /app
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: client_host=192.168.65.254 client_port=9003 idekey=VSCODE
      XDEBUG_SESSION: VSCODE
      PHP_IDE_CONFIG: serverName=FlashFoodDocker
    volumes:
      - .:/app
      - vendor_data:/app/vendor
    ports:
      - "8000:8000"
      - "8080:8080"
    depends_on:
      - db
      - redis
    command: sh -c "set -e; test -f vendor/autoload.php || composer install; php artisan reverb:start --host=0.0.0.0 --port=8080 & exec php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: mysql:8.0
    container_name: mysql_container
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: FlashFood

    ports:
      - "3307:3306"

    volumes:
      - db_data:/var/lib/mysql

  node:
    image: node:22
    container_name: node_FlashFood
    working_dir: /app
    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  cypress:
    image: cypress/included:15.14.2
    container_name: cypress_FlashFood
    working_dir: /app
    profiles:
      - test
    depends_on:
      - app
      - db
      - node
    environment:
      CYPRESS_BASE_URL: http://app:8000
      CYPRESS_DB_HOST: db
      CYPRESS_DB_PORT: 3306
      CYPRESS_DB_DATABASE: FlashFood
      CYPRESS_DB_USERNAME: root
      CYPRESS_DB_PASSWORD: root
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: FlashFood
      DB_USERNAME: root
      DB_PASSWORD: root
    volumes:
      - .:/app
      - /app/node_modules
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - "npm ci && npx cypress run"


  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  db_data:
  vendor_data:
