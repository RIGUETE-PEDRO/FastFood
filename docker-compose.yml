services:

  app:
    build: .
    container_name: laravel_flashfood
    working_dir: /app
    volumes:
      - .:/app
      - vendor_data:/app/vendor
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: sh -c "test -f vendor/autoload.php || composer install && php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: mysql:8.0
    container_name: mysql_container
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: FlashFood

    ports:
      - "3307:3306"

    volumes:
      - db_data:/var/lib/mysql

  node:
    image: node:22
    container_name: node_FlashFood
    working_dir: /app

    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  db_data:
  vendor_data:
